# KakshAI Docker Compose
#
# Usage:
#   1. Start Supabase first:  cd supabase-docker && docker compose up -d
#   2. Then start the app:    docker compose up -d
#
# Supabase services (Postgres, Auth, Studio, etc.) run in supabase-docker/.
# This file only runs the Next.js app + Redis for rate limiting.

services:
  kakshai:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      # Optional: mount server-providers.yml for provider config
      # - ./server-providers.yml:/app/server-providers.yml:ro
      - kakshai-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  kakshai-data:
  redis-data:
